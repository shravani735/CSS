<!DOCTYPE html>
<html>

<head>

<style>

body{
background:#f4f4f4;
font-family:Verdana,sans-serif;
}

h1{

font-size:45px;
font-weight:bold;
text-align:center;
text-transform:uppercase;
color:navy;
letter-spacing:3px;
text-shadow:2px 2px 5px gray;

}

p{

font-size:20px;
font-style:italic;
font-weight:400;
line-height:1.8;
word-spacing:8px;
text-align:justify;
text-indent:40px;
color:#333;

}

a{

text-decoration:none;
color:red;

}

</style>

</head>

<body>

<h1>CSS Typography</h1>

<p>

CSS Typography helps improve the appearance of text on web pages.
It includes font family, font size, font weight, font style,
text alignment, spacing, shadows, and many more properties.

</p>

</html>
